name: Reset demo data

# Keeps the public Amicalola demo pristine — re-seeds it nightly so visitors
# can click around freely without permanently defacing it.
# Only touches the demo org; real customer organizations are never affected.
#
# Requires one repo secret named SUPABASE_SERVICE_ROLE_KEY
# (Settings → Secrets and variables → Actions → New repository secret)

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC (~3–4am US Eastern)
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Re-seed demo org
        run: node scripts/seed.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://upbzutjlzfrzqpcuagmh.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
